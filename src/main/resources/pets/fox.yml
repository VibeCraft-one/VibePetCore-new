  sample-mode: true
  radius: 4.5
  blacklist: [ROTTEN_FLESH, NETHERRACK, COBBLESTONE]
scale-by-evolution:
  1: 0.68
  2: 0.90
  3: 1.11
  4: 1.33
  5: 1.54
