  ambient-speed-multiplier: 0.72
  max-stay-seconds: 80
  spawn-retry-seconds: 3
emotion:
  enabled: true
  interval-min-ticks: 30
  interval-max-ticks: 66
food:
  heal: [CHICKEN, COOKED_CHICKEN, RABBIT, COOKED_RABBIT]
