# Задания VibePetCore.
# Простыми словами:
# id задания можно назвать как угодно латиницей.
# category:
#   daily     - задания на день, заметно длиннее разовой пробежки.
#   weekly    - долгие задания на неделю.
#   evolution - задания под развитие конкретного питомца.
#   gather    - принести предметы через GUI Источника.
#   combat    - боевые цели.
#   explore   - мир, прогулки и необычные находки.
# type:
#   KILL_MOB    - убить моба, target = тип моба, например ZOMBIE.
#   BREAK_BLOCK - сломать блок, target = блок, например STONE.
#   PICKUP_ITEM - принести предмет, target = предмет, например RAW_IRON. В GUI предметы спишутся.
# amount - сколько нужно.
# reward-points - сколько Pet Points дать. Очки нужны для платных открытий Источника.
# repeat-cooldown-minutes: 1440 = раз в день, 10080 = раз в неделю, -1 = одноразовое.
