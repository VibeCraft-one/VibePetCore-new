help.pet.summon.header: "Призыв:"
help.pet.summon.line1: "- Возьмите заполненное ядро во вторую руку и нажмите ПКМ."
help.pet.summon.line2: "- Первый призыв занимает 3 секунды, обычный — 2 секунды."
help.pet.summon.line3: "- Возьмите пустое ядро этого питомца во вторую руку и нажмите ПКМ, чтобы вернуть питомца."
help.pet.summon.line4: "- В креативе и наблюдателе питомец автоматически возвращается в ядро."
help.pet.death.header: "Смерть и штраф:"
help.pet.death.line1: "- После смерти питомца действует штраф на восстановление."
help.pet.death.line2: "- Пока штраф активен, питомца нельзя призвать."
help.pet.death.line3: "- Лор ядра показывает штраф только пока он активен."
help.pet.growth.header: "Рост и эволюция:"
help.pet.growth.line1: "- Кормите питомца подходящей едой: она восстанавливает сытость, а HP возвращается постепенно из сытости."
help.pet.growth.line2: "- У каждой стадии свой уровень, связь, ресурсы и квесты стадии."
help.pet.growth.line3: "- {text}"
help.pet.growth.line4: "- {text}"
help.pet.growth.line5: "- {text}"
help.pet.growth.line6: "- {text}"
help.pet.growth.line7: "- Связь растет от нахождения рядом, кормления и выполнения квестов."
help.pet.growth.line8: "- На первой стадии питомцы маленькие, дальше они заметно растут."
help.pet.backpack.header: "Рюкзак питомца:"
help.pet.backpack.line1: "- Откройте через /pet vault или через меню питомца."
help.pet.backpack.line2: "- Для loot-питомцев предмет внутри рюкзака задает фильтр."
help.pet.backpack.line3: "- Размер рюкзака растет вместе с питомцем."
help.pet.roles.header: "Роли питомцев:"
help.pet.roles.line1: "- Боевые питомцы защищают игрока и чаще отвечают на атаку."
help.pet.roles.line2: "- Поддержка сильнее завязана на эффекты и мягкую реакцию."
help.pet.roles.line3: "- Loot-питомцы сильнее завязаны на рюкзак и подбор предметов."
help.pet.commands.header: "Команды игрока:"
help.pet.commands.line1: "- /pet или /pet menu - открыть меню питомца."
help.pet.commands.line2: "- /pet name <имя> - дать питомцу имя раз в час."
help.pet.commands.line3: "- /pet vault, /pet autoloot, /pet defense, /pet evolve"
help.pet.commands.line4: "- Квесты, награды и ящики открываются через Источник питомцев."
help.pet.quests.header: "Квесты:"
help.pet.quests.line1: "- Берите и сдавайте их через Источник питомцев -> Квесты."
help.pet.quests.line2: "- Ежедневные и недельные квесты возвращаются после отката."
help.pet.quests.line3: "- Квесты дают очки питомца для платных открытий Источника."
help.pet.admin-only: "Этот раздел доступен через /vpc help admin."
help.pet.admin.header: "Админ-команды:"
help.pet.admin.line1: "- /vpc status, /vpc reload, /vpc save"
help.pet.admin.line2: "- /vpc spawn, /vpc remove, /vpc debugpet"
help.pet.admin.line3: "- /vpc admin giveegg, addattempts, addpoints, takepoints"
help.pet.admin.line4: "- /vpc admin setevolution, setlevel, setrarity, setsatiety"
help.pet.admin.line5: "- /vpc admin repaircore, inspect, audit, fixegg, fixpet, dumpconfig, debugtest"
help.pet.admin.line6: "- /vpc DANGER-DELETE <All|player> с подтверждением через /vpc confirm."
help.pet.storage.header: "Хранение данных:"
help.pet.storage.line1: "- storage.backend в config.yml выбирает sqlite, mysql или json."
help.pet.storage.line2: "- sqlite = players.db, mysql = таблица MySQL, json = players/<uuid>.json."
help.pet.storage.line3: "- Данные кэшируются и сохраняются по save, quit и по таймеру."
help.pet.vex: "VEX - это временная сервисная форма легендарного Allay; отдельного ядра у него нет."
help.pet.type.role: "- Роль: {role}."
help.pet.type.buffs: "- Бонусы:"
