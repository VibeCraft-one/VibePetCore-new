gui.pet.text.support.axolotl.1: "&7Роль: &fводная поддержка."
gui.pet.text.support.axolotl.2: "&7Помогает в воде: дыхание, восстановление и мягкая защита."
gui.pet.text.support.breeze.1: "&7Роль: &fветреный боец."
gui.pet.text.support.breeze.2: "&7Даёт скорость, прыжки и более безопасную вертикальную игру."
gui.pet.text.support.frog.1: "&7Роль: &fболотная мобильность."
gui.pet.text.support.frog.2: "&7Помогает с прыжками, водой и гибким перемещением."
gui.pet.text.support.ghast.1: "&7Роль: &fвоздушное давление."
gui.pet.text.support.ghast.2: "&7Смягчает падения и раскрывается во взрывной поддержке."
gui.pet.text.support.panda.1: "&7Роль: &fспокойное выживание."
gui.pet.text.support.panda.2: "&7Медленнее по темпу, зато стабильно поддерживает владельца."
gui.pet.text.support.phantom.1: "&7Роль: &fночное преследование."
gui.pet.text.support.phantom.2: "&7Поддерживает ночное движение, пикирование и погоню."
gui.pet.text.support.armadillo.1: "&7Роль: &fброня и устойчивость."
gui.pet.text.support.armadillo.2: "&7Надёжно защищает и смягчает опасные перемещения."
gui.pet.text.support.vex.1: "&7Роль: &fвзрывной урон."
gui.pet.text.support.vex.2: "&7Временная агрессивная форма с резкими атаками."
gui.pet.text.lore.axolotl.1: "&7Хорошо чувствует себя у воды и в долгих вылазках."
gui.pet.text.lore.axolotl.2: "&7Развивается в мягкого защитного саппорта."
gui.pet.text.lore.breeze.1: "&7Быстрый, резкий и завязан на движение."
gui.pet.text.lore.breeze.2: "&7Подходит игрокам, которые любят темп и вертикальные бои."
gui.pet.text.lore.frog.1: "&7Мобильный питомец для воды, болот и прыжков."
gui.pet.text.lore.frog.2: "&7Полезен, когда рельеф постоянно меняется."
gui.pet.text.lore.ghast.1: "&7Редкий воздушный питомец с высоким взрывным потенциалом."
gui.pet.text.lore.ghast.2: "&7Лучше раскрывается там, где важны падения, огонь и давление."
gui.pet.text.lore.panda.1: "&7Медленный, спокойный и заточенный под выживание."
gui.pet.text.lore.panda.2: "&7Хорош для безопасных долгих сессий."
gui.pet.text.lore.phantom.1: "&7Ночной охотник с воздушным давлением."
gui.pet.text.lore.phantom.2: "&7Подходит для погони и рискованного движения."
gui.pet.text.lore.armadillo.1: "&7Компактный защитный спутник."
gui.pet.text.lore.armadillo.2: "&7Полезен, когда устойчивость важнее скорости."
gui.pet.text.lore.vex.1: "&7Временная сервисная форма Allay."
gui.pet.text.lore.vex.2: "&7Сфокусирован на внезапном взрывном уроне."
