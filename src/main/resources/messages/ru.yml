help.pet.evolution.quest-suffix: ", квесты: {quests}"
help.pet.evolution.no-quest-suffix: ", квесты не нужны"
help.admin.header: "Админ-команды VibePet:"
help.admin.line1: "- /vpc admin giveegg <player> <type> <rarity> - выдать новое ядро питомца."
help.admin.line2: "- /vpc admin addattempts <player> <amount> - добавить попытки Источника."
help.admin.line3: "- /vpc admin addpoints <player> <amount> - выдать очки прогресса питомца."
help.admin.line4: "- /vpc admin takepoints <player> <amount> - убрать очки прогресса питомца."
help.admin.line5: "- /vpc admin setevolution <1-5> - сменить эволюцию ядра в руке."
help.admin.line6: "- /vpc admin setlevel <1-10> - сменить уровень ядра в руке."
help.admin.line7: "- /vpc admin setrarity <rarity> - сменить редкость ядра в руке."
help.admin.line8: "- /vpc admin repaircore - починить ядро в руке и убрать штраф."
help.admin.danger.header: "Опасное удаление питомцев:"
help.admin.danger.line1: "- /vpc DANGER-DELETE <player> - удалить яйца, данные и активного питомца онлайн-игрока."
help.admin.danger.line2: "- /vpc DANGER-DELETE All - удалить поколение питомцев и сделать старые яйца недействительными."
help.admin.danger.line3: "- После команды нужно выполнить /vpc confirm в течение 10 секунд."
help.admin.danger.line4: "- Используйте только для чистки дюпов или старых сломанных версий."
help.admin.debug.header: "Диагностика VibePet:"
help.admin.debug.line1: "- /vpc debugpet - показать состояние runtime текущего питомца и ядра в руке."
help.admin.debug.line2: "- /vpc admin inspect - то же самое через admin-подкоманду."
help.admin.debug.line3: "- /vpc admin audit - поиск дублей petId, сломанных кнопок и рассинхрона."
help.admin.debug.line4: "- /vpc admin fixpet - попытаться пересоздать runtime-питомца."
help.admin.debug.line5: "- /vpc admin dumpconfig - вывести ключевые настройки мира и debug."
help.admin.debug.line6: "- /vpc admin debugtest - записать тестовую debug-строку."
help.admin.storage.header: "Хранение данных:"
help.admin.storage.line1: "- /vpc save - принудительно сохранить данные игроков."
help.admin.storage.line2: "- storage.backend в config.yml выбирает sqlite, mysql или json."
help.admin.storage.line3: "- sqlite хранит данные в players.db, mysql - в таблице MySQL, json - в players/<uuid>.json."
help.admin.storage.line4: "- Если подозреваете рассинхрон, сначала /vpc save, потом перезапуск."
help.admin.default.header: "Справка админа VibePet:"
help.admin.default.line1: "- /vpc status - посмотреть, сколько игроков загружено в память."
help.admin.default.line2: "- /vpc reload - перечитать config.yml и модули без полного рестарта."
help.admin.default.line3: "- /vpc save - сохранить данные игроков вручную."
help.admin.default.line4: "- /vpc spawn <type> - тестово заспавнить runtime-питомца рядом с админом."
help.admin.default.line5: "- /vpc remove - удалить активного runtime-питомца админа."
help.admin.default.line6: "- /vpc leaderboard - топ игроков по очкам питомца."
help.admin.default.line7: "- /vpc help admin - яйца, очки, уровни и ремонт ядра."
help.admin.default.line8: "- /vpc help source - команды Источника и точки телепорта."
help.admin.default.line9: "- /vpc tppoint set/info/clear - управление точкой телепорта."
help.admin.default.line10: "- /vpc help danger - опасное удаление старых/дюпнутых питомцев."
help.admin.default.line11: "- /vpc help debug - runtime, ядро в руке и диагностика конфига."
help.admin.default.line12: "- /pet help - открывает GUI-справку для игроков; /pet help growth дает тему по росту."
