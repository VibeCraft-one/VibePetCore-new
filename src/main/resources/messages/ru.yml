help.pet.type.evolution: "- Эволюция требует ресурсы, а на поздних стадиях ещё и квесты стадии."
help.pet.type.tip: "- Совет: возьмите ядро во вторую руку и нажмите ПКМ."
help.pet.unknown: "Неизвестная тема справки или тип питомца."
help.pet.default.header: "Справка VibePet:"
help.pet.default.line1: "- /pet или /pet menu - открыть активное меню питомца."
help.pet.default.line2: "- Источник питомцев открывает квесты, награды, кузню и справку."
help.pet.default.line3: "- В GUI справки выберите питомца, чтобы увидеть еду и роль."
help.pet.default.line4: "- /pet help quests - как работают квесты и сдача ресурсов."
help.pet.default.line5: "- /pet help source - как работает Источник и телепорт."
help.pet.default.line6: "- /pet help storage - где хранятся данные игрока."
help.pet.quests.short1: "Квесты: берите их у Источника питомцев -> Квесты, затем выполняйте цель."
help.pet.quests.short2: "Gather-квесты сдаются через GUI: требуемые предметы забираются автоматически."
help.pet.quests.short3: "Daily/weekly-квесты повторяются после отката; evolution-квесты обычно одноразовые."
help.pet.storage.short1: "Хранилище: storage.backend в config.yml. sqlite = players.db, mysql = база MySQL, json = players/<uuid>.json."
help.pet.storage.short2: "Данные кэшируются в памяти и пишутся на save/quit/interval."
help.pet.vex.short: "VEX - временная сервисная форма легендарного Allay, отдельного яйца у него нет."
help.pet.type.short1: "- Возьмите ядро во вторую руку и нажмите ПКМ, чтобы призвать питомца."
help.pet.type.short2: "- Еда: {food}"
help.pet.type.short3: "- Эволюция требует ресурсы, а на поздних стадиях ещё и квесты стадии."
help.pet.type.short4: "- Управление, рост и особенности открываются через /pet."
help.pet.unknown-short: "Неизвестный тип питомца."
