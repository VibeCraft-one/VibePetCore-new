help.admin.header: "VibePet admin commands:"
help.admin.line1: "- /vpc admin giveegg <player> <type> <rarity> - give a new pet core."
help.admin.line2: "- /vpc admin addattempts <player> <amount> - add loot-box attempts."
help.admin.line3: "- /vpc admin addpoints <player> <amount> - grant pet progress points."
help.admin.line4: "- /vpc admin takepoints <player> <amount> - remove pet progress points."
help.admin.line5: "- /vpc admin setevolution <1-5> - change the held core evolution."
help.admin.line6: "- /vpc admin setlevel <1-10> - change the held core level."
help.admin.line7: "- /vpc admin setrarity <rarity> - change the held core rarity."
help.admin.line8: "- /vpc admin repaircore - repair the held core and remove the penalty."
help.admin.danger.header: "Dangerous pet deletion:"
help.admin.danger.line1: "- /vpc DANGER-DELETE <player> - delete eggs, data, and the online player's active pet."
help.admin.danger.line2: "- /vpc DANGER-DELETE All - delete the pet generation and invalidate old eggs."
help.admin.danger.line3: "- After the command you must run /vpc confirm within 10 seconds."
help.admin.danger.line4: "- Use only before cleaning dupes or old broken versions."
help.admin.debug.header: "VibePet diagnostics:"
help.admin.debug.line1: "- /vpc debugpet - show runtime state for the current pet and held core."
help.admin.debug.line2: "- /vpc admin inspect - same thing through the admin subcommand."
help.admin.debug.line3: "- /vpc admin audit - search for duplicate petId values, broken buttons, and desync."
help.admin.debug.line4: "- /vpc admin fixpet - try to recreate the runtime pet."
help.admin.debug.line5: "- /vpc admin dumpconfig - print key world and debug settings."
help.admin.debug.line6: "- /vpc admin debugtest - write a test debug line."
help.admin.storage.header: "Data storage:"
help.admin.storage.line1: "- /vpc save - force-save player data."
help.admin.storage.line2: "- storage.backend in config.yml chooses sqlite, mysql, or json."
help.admin.storage.line3: "- sqlite stores data in players.db, mysql stores a MySQL table, json stores players/<uuid>.json."
help.admin.storage.line4: "- If you suspect desync, run /vpc save first and then restart."
help.admin.default.header: "VibePet admin help:"
help.admin.default.line1: "- /vpc status - check how many players are loaded in memory."
help.admin.default.line2: "- /vpc reload - reread config.yml and modules without a full restart."
help.admin.default.line3: "- /vpc save - save player data manually."
help.admin.default.line4: "- /vpc spawn <type> - test-spawn a runtime pet near the admin."
help.admin.default.line5: "- /vpc remove - remove the admin's active runtime pet."
help.admin.default.line6: "- /vpc leaderboard - top players by pet points."
help.admin.default.line7: "- /vpc help admin - eggs, points, levels, and core repair."
help.admin.default.line8: "- /vpc help source - source and teleport-point commands."
help.admin.default.line9: "- /vpc tppoint set/info/clear - teleport destination controls."
help.admin.default.line10: "- /vpc help danger - dangerous deletion of old/duped pets."
help.admin.default.line11: "- /vpc help debug - runtime, held core, and config diagnostics."
help.admin.default.line12: "- /pet help - opens the GUI help for players; /pet help growth gives a focused topic."
