help.pet.header: "VibePet help:"
help.pet.summon: "- /pet help summon - how to summon and hide a pet."
help.pet.death: "- /pet help death - what happens after death."
help.pet.growth: "- /pet help growth - feeding, levels, and evolution."
help.pet.backpack: "- /pet help backpack - how the pet backpack works."
help.pet.roles: "- /pet help roles - what makes pets different."
help.pet.commands: "- /pet help commands - quick player commands."
help.pet.topic: "- /pet help <wolf|cat|allay|...> - a short overview of a specific pet."
help.pet.quests: "- /pet help quests - tasks and rewards."
help.pet.admin: "- /vpc help admin - admin commands."
help.pet.storage: "- /vpc help storage - data storage."
help.pet.summon.header: "Summoning:"
help.pet.summon.line1: "- Put the filled core in your offhand and right-click."
help.pet.summon.line2: "- The first summon takes 3 seconds, the normal summon takes 2 seconds."
help.pet.summon.line3: "- Put the matching empty core in your offhand and right-click to return the pet."
help.pet.summon.line4: "- In creative and spectator, the pet is automatically returned to the core."
help.pet.death.header: "Death and penalty:"
help.pet.death.line1: "- After pet death, a recovery penalty applies."
help.pet.death.line2: "- While the penalty is active, the pet cannot be summoned."
help.pet.death.line3: "- The core lore shows the penalty only while it is active."
help.pet.growth.header: "Growth and evolution:"
help.pet.growth.line1: "- Feed the pet suitable food: it restores satiety, and HP regenerates gradually from satiety."
help.pet.growth.line2: "- Each stage has its own level, bond, resources, and stage quests."
help.pet.growth.line3: "- {text}"
help.pet.growth.line4: "- {text}"
help.pet.growth.line5: "- {text}"
help.pet.growth.line6: "- {text}"
help.pet.growth.line7: "- Bond grows from staying nearby, feeding, and completing pet quests."
help.pet.growth.line8: "- At the first stage pets look small; later they grow more visibly."
help.pet.backpack.header: "Pet backpack:"
help.pet.backpack.line1: "- Open it with /pet vault or from the pet menu."
help.pet.backpack.line2: "- For loot pets, the sample item inside the backpack sets the filter."
help.pet.backpack.line3: "- Backpack size grows with the pet."
help.pet.roles.header: "Pet roles:"
help.pet.roles.line1: "- Combat pets protect the player and retaliate more often."
help.pet.roles.line2: "- Support pets rely more on effects and softer reactions."
help.pet.roles.line3: "- Loot pets are more focused on backpacks and pickup behavior."
help.pet.commands.header: "Player commands:"
help.pet.commands.line1: "- /pet or /pet menu - open the pet menu."
help.pet.commands.line2: "- /pet name <name> - rename the pet once per hour."
help.pet.commands.line3: "- /pet vault, /pet autoloot, /pet defense, /pet evolve"
help.pet.commands.line4: "- Quests, rewards, and boxes are opened through the Pet Source."
help.pet.quests.header: "Quests:"
help.pet.quests.line1: "- Accept and turn them in through Pet Source -> Quests."
help.pet.quests.line2: "- Daily and weekly quests return after cooldown."
help.pet.quests.line3: "- Quests reward Pet Points for paid Source openings."
help.pet.admin-only: "This topic is available through /vpc help admin."
help.pet.admin.header: "Admin commands:"
help.pet.admin.line1: "- /vpc status, /vpc reload, /vpc save"
help.pet.admin.line2: "- /vpc spawn, /vpc remove, /vpc debugpet"
help.pet.admin.line3: "- /vpc admin giveegg, addattempts, addpoints, takepoints"
help.pet.admin.line4: "- /vpc admin setevolution, setlevel, setrarity, setsatiety"
help.pet.admin.line5: "- /vpc admin repaircore, inspect, audit, fixegg, fixpet, dumpconfig, debugtest"
help.pet.admin.line6: "- /vpc DANGER-DELETE <All|player> with confirmation via /vpc confirm."
help.pet.storage.header: "Data storage:"
help.pet.storage.line1: "- storage.backend in config.yml chooses sqlite, mysql, or json."
help.pet.storage.line2: "- sqlite = players.db, mysql = a MySQL table, json = players/<uuid>.json."
help.pet.storage.line3: "- Data is cached and saved on save, quit, and on interval."
help.pet.vex: "VEX is a temporary service form of the legendary Allay; it has no separate core."
help.pet.type.role: "- Role: {role}."
help.pet.type.buffs: "- Buffs:"
help.pet.type.food: "- Favorite food: {food}"
help.pet.type.evolution: "- Evolution requires resources, and later stages also need stage quests."
help.pet.type.tip: "- Tip: put the core in your offhand and right-click."
help.pet.unknown: "Unknown help topic or pet type."
help.pet.default.header: "VibePet help:"
help.pet.default.line1: "- /pet or /pet menu - open the active pet menu."
help.pet.default.line2: "- The Pet Source opens quests, rewards, forge, and guide."
help.pet.default.line3: "- In the guide GUI, choose a pet to see food and role."
help.pet.default.line4: "- /pet help quests - how quests and resource turn-ins work."
help.pet.default.line5: "- /pet help source - how Pet Source and teleport work."
help.pet.default.line6: "- /pet help storage - where player data is stored."
help.pet.quests.short1: "Quests: accept them through Pet Source -> Quests, then complete the objective."
help.pet.quests.short2: "Gather quests are turned in through the GUI: the required items are consumed automatically."
help.pet.quests.short3: "Daily/weekly quests repeat after cooldown; evolution quests are usually one-time."
help.pet.storage.short1: "Storage: storage.backend in config.yml. sqlite = players.db, mysql = MySQL database, json = players/<uuid>.json."
help.pet.storage.short2: "Data is cached in memory and writes on save/quit/interval."
help.pet.vex.short: "VEX is a temporary service form of the legendary Allay, so it has no separate egg."
help.pet.type.short1: "- Put the core in your offhand and right-click to summon the pet."
help.pet.type.short2: "- Food: {food}"
help.pet.type.short3: "- Evolution requires resources, and later stages also require stage quests."
help.pet.type.short4: "- Controls, growth, and traits are opened through /pet."
